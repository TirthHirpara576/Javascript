<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #548687;
            text-align: center;
        }

        .container {
            height: 70vh;
            display: flex;

            justify-content: center;
            align-items: center;
        }

        .game {
            height: 60vmin;
            width: 60vmin;
            display: flex;
            flex-wrap: wrap;  /* 3-3-3 boxes rakhva mate...(K bhai 1 row ma jagya na hoi to niche wrap thai jao) */
            justify-content: center;
            align-items: center;
            gap: 1.5vmin;   /* 2 box ni vachche no gap */
        }

        .box {
            height: 18vmin;
            width: 18vmin;
            border-radius: 1rem;
            border: none;
            box-shadow: 0 0 1rem rgba(0, 0, 0, 0.3);
            font-size: 8vmin;
            color: #b0413e;

            background-color: #ffffc7;  /* box.disabled = true; na mate devo padyo...because button click karto bg-color vayo jato hato */
        }

        #reset-btn {
            padding: 1rem;
            font-size: 1.25rem;
            background-color: #191913;
            color: #fff;
            border-radius: 1rem;
            border: none;
        }

        #new-btn {
            padding: 1rem;
            font-size: 1.25rem;
            background-color: #191913;
            color: #fff;
            border-radius: 1rem;
            border: none;
        }

        #msg {
            color: #ffffc7;
            font-size: 5vmin;
        }

        .msg-container {
            height: 100vmin;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 4rem;
        }

        .hide {
            display: none;
        }
    </style>
  </head>
  <body>
    <div class="msg-container hide">
        <p id="msg">Winner</p>
        <button id="new-btn">New Game</button>
    </div>
    <main>
        <h1>Tic Tac Toe</h1>
        <div class="container">
            <div class="game">
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            </div>
        </div>
        <button id="reset-btn">Reset Game</button>
    </main>


    <script>
        let boxes = document.querySelectorAll(".box");
        let resetBtn = document.querySelector("#reset-btn");

        let msgContainer = document.querySelector(".msg-container");
        let msg = document.querySelector("#msg");
        let newGameBtn = document.querySelector("#new-btn");

        let turnO = true;  // pleyer-O , if false -> pleyer-X
        let count = 0; //To Track Draw

        const winPatterns = [ [0, 1, 2],[0, 3, 6],[0, 4, 8],[1, 4, 7],[2, 5, 8],[2, 4, 6],[3, 4, 5],[6, 7, 8] ];

        // aa fun tyare j call thashe jyare Reset & New Game button par click karishu... 
        const resetGame = () => {
            turnO = true;
            count = 0;
            enableBoxes();
            msgContainer.classList.add("hide");
            msg.innerText = ""; // Clear the winner message
        };

        boxes.forEach((box) => {
            //console.log("Button was clicked");
            //box.innerHTML = "abc";
            box.addEventListener("click", () => {
                if (turnO) {
                    //playerO
                    box.innerText = "O";
                    turnO = false;
                } else {
                    //playerX
                    box.innerText = "X";
                    turnO = true;
                }
                box.disabled = true;  // ak var je button press thai jai te biji var press na thavo joiye... (problem : bg color vayo jai)
                count++;

                let isWinner = checkWinner();

                if (count === 9 && !isWinner)  gameDraw();
            });
        });

        const disableBoxes = () => {
            for (let box of boxes) {
                box.disabled = true;
            }
        };

        const enableBoxes = () => {  // game jyare pharithi start thai tyare badha boxes Enable thai java joiye & badha boxes ni value empty thai javi joiye...
            for (let box of boxes) {
                box.disabled = false;
                box.innerText = "";
            }
        };

        const gameDraw = () => {
            msg.innerText = `Game was a Draw.`;
            msgContainer.classList.remove("hide");
            disableBoxes();
        };

        const showWinner = (winner) => {
            msg.innerText = `Congratulations, Winner is ${winner}`;
            msgContainer.classList.remove("hide");
            disableBoxes();  // ak var winner thai gya pachhi koi button press na thava joiye...
        };

        const checkWinner = () => {
            for (let pattern of winPatterns) {
                //console.log(pattern);  // 1-1 pattern print thai
                //console.log(pattern[0],pattern[1],pattern[2]);  // 1 pattern na individual elements -> box na indices
                //console.log( boxes[pattern[0]].innerText , boxes[pattern[1]].innerText , boxes[pattern[2]].innerText);  // individual box na indices console par print thai
                let pos1Val = boxes[pattern[0]].innerText;
                let pos2Val = boxes[pattern[1]].innerText;
                let pos3Val = boxes[pattern[2]].innerText;

                if (pos1Val != "" && pos2Val != "" && pos3Val != "") {
                    if (pos1Val === pos2Val && pos2Val === pos3Val) {
                        showWinner(pos1Val);
                        return true;
                    }
                }
            }
            return false;  // No winner, return false
        };

        newGameBtn.addEventListener("click", resetGame);
        resetBtn.addEventListener("click", resetGame);


    </script>
  </body>
</html>
