<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>

        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: "Gill Sans", sans-serif;
            }
            body{
                width: 100vw;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: linear-gradient(45deg,#0a0a0a,#3a4452);
            }
            .calculator{
                border: 1px solid #717377;
                padding: 16px;
                border-radius: 16px;
                background: transparent;
                box-shadow: 0px 3px 15px rgba(113,115,119,0.5);
            }
            input{
                width: 320px;
                border: 2px solid white;
                padding: 10px;
                margin: 10px;
                box-shadow: 0px 3px 15px rgba(84,84,84,0.1);
                font-size: xx-large;
                text-align: right;
                cursor: pointer;
            }
            input::placeholder{
                color: #0a0a0a;
            }
            button{
                border: none;
                width: 60px;
                height: 60px;
                margin: 10px;
                border-radius: 50%;

                font-size: large;
            }
            .btn:hover{
                background-color: rgb(210, 210, 59);
                box-shadow: 0px 3px 15px rgba(113,115,119,0.5);
                border: 2px solid black;
            }
            .Equal{
                background-color: #fb7c14
            }
        </style>
    </head>
    <body>
        <div class="calculator">
            <input type="text" id="inputBox" placeholder="0">
            <div>
                <button class="btn">AC</button>
                <button class="btn">DEL</button>
                <button class="btn">%</button>
                <button class="btn">/</button>
            </div>
            <div>
                <button class="btn">7</button>
                <button class="btn">8</button>
                <button class="btn">9</button>
                <button class="btn">*</button>
            </div>
            <div>
                <button class="btn">4</button>
                <button class="btn">5</button>
                <button class="btn">6</button>
                <button class="btn">-</button>
            </div>
            <div>
                <button class="btn">1</button>
                <button class="btn">2</button>
                <button class="btn">3</button>
                <button class="btn">+</button>
            </div>
            <div>
                <button class="btn">00</button>
                <button class="btn">0</button>
                <button class="btn">.</button>
                <button class="Equal">=</button>
            </div>
        </div>


        <script>
            let input = document.getElementById("inputBox");
            let buttons = document.querySelectorAll('button');

            let string = "";
            buttons.forEach((button) => {
            button.addEventListener("click", (event) => {
                if(event.target.innerHTML == '='){
                    string = eval(string);     // evaluete -> in-Built fun in JS which calculate content inside string and return that string as an output
                    input.value = string;
                }
                else if(event.target.innerHTML == 'AC'){
                    string = "";
                    input.value = string;
                }
                else if(event.target.innerHTML == 'DEL'){
                    string = string.substring(0,string.length-1);
                    input.value = string;
                }
                else{ // if any Other button
                    string += event.target.innerHTML;
                    input.value = string;
                }
            });
        });
        </script>
    </body>
</html>
