<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form validation using regular expression</title>
    </head>
    <body>
        <form name="frm" action="login.php" method="post">
            Username : <input type="text" id="un" placeholder=" Enter your Username"> <br><br>

            password : <input type="password" id="pw" placeholder=" Enter your password"> <br><br>

            Phone number : <input type="text" id="pn" placeholder=" Enter your Phone number"><br><br>

            E-mail ID : <input type="text" id="ei" placeholder=" Enter your email id"><br><br>

            Pan number : <input type="text" id="pan" placeholder=" Enter your pan number"><br><br>

            Aadhar number : <input type="text" id="aa" placeholder=" Enter your Aadhar number"><br><br>

            DOB : <input type="text" id="dob" placeholder="yyyy-mm-dd"><br><br>

            url : <input type="text" id="url" placeholder="enter url "><br><br>
            
            MAC address : <input type="text" id="macAddress" placeholder="enter MAC address "><br><br>
            
            <input type="submit" name="submit" id="submit" onclick="return myfun()">
        </form>
        <p id="sms"></p>

        <script>
            function myfun(){
                // Username validation (8-15 characters, cannot start with digit or special characters)
                var UserName = document.getElementById('un').value;
                if(UserName == ""){
                    alert("Enter Username ");
                    return false;
                }
                var usernamePattern = /^[a-zA-Z][a-zA-Z0-9.]{7,14}$/; // 8-15 characters, starts with a letter
                if (!usernamePattern.test(UserName)){
                    alert("Invalid Username! It must be 8-15 characters long and cannot start with digits or special characters.");
                    return false;
                }

                var password = document.getElementById('pw').value;
                var Pattern = /^\w{8}$/;
                if (!Pattern.test(password)){
                    alert("Password must be 8 digit");
                    return false;
                }

                var phone = document.getElementById('pn').value;
                var pattern = /^\d{10}$/;
                if(!pattern.test(phone)){
                    alert("phone number is not valid!");
                    return false;
                }

                var email = document.getElementById('ei').value;
                var pattern = /^[a-z][a-z0-9]+@[a-z]{4,5}\.[a-z]{2,4}$/;
                //var pattern = /^[a-zA-Z0-9.]+@[a-z]+\.[a-z]{2,}$/;
                if(!pattern.test(email)){
                    alert("email id is not valid!");
                    return false;
                }

                var pan_num = document.getElementById('pan').value;
                var pattern = /^[A-Z]{5}\d{4}[A-Z]{1}$/;
                if(!pattern.test(pan_num)){
                    alert("pan number is not valid!");
                    return false;
                }

                var Aadhar_num = document.getElementById('aa').value;
                var pattern = /^\d{4}\s\d{4}\s\d{4}$/;
                if(!pattern.test(Aadhar_num)){
                    alert("Aadhar number is not valid!");
                    return false;
                }

                var Dob = document.getElementById('dob').value;
                var pattern = /^\d{4}\-(0[1-9]|1[0-2])\-\d{2}$/;
                if(!pattern.test(Dob)){
                    alert("DOB is not valid!");
                    return false;
                }

                var URL = document.getElementById('url').value;
                var pattern = /^(http:\/\/|https:\/\/)[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}(\.[a-zA-Z]{2,})?$/;  
                if(!pattern.test(URL)){
                    alert("url is not valid!");
                    return false;
                }

                // MAC Address Validation (Format: XX:XX:XX:XX:XX:XX or XX-XX-XX-XX-XX-XX)
                //Matches five occurrences of : Exactly two hexadecimal characters (0-9, A-F, a-f). Followed by either a colon (:) or a hyphen (-).
                //[0-9A-Fa-f]{2} → Ensures the last two characters are hexadecimal digits without : or - at the end.
                var macAddress = document.getElementById('macAddress').value;
                var macPattern = /^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$/;
                if (!macPattern.test(macAddress)) {
                    alert("MAC Address must be in format: XX:XX:XX:XX:XX:XX (e.g., 00:1A:2B:3C:4D:5E)");
                    return false;
                }

                // Ip address :   /^([0-9]{1,3}\.){3}([0-9]{1,3})$/
            }
        </script>
    </body>
</html>
