            // Another example of Async-Await :
            function getData(data_id){
                return new Promise( (resolve,reject) => {
                    setTimeout( () => {
                        console.log("data:",data_id);
                        resolve("success");
                    },4000);
                });
            }
            async function getAllData(){  // write in console -> getAllData() + Enter
                console.log("getting data-1...");
                await getData(1);         // 1st call complete thaya bad 2nd call lagshe...
                console.log("getting data-2...");               
                await getData(2); 
                console.log("getting data-3...");
                await getData(3);
                console.log("getting data-4...");
                await getData(4);
